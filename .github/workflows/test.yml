name: Run Tests

on:
  pull_request:
  # push:
  #   branches-ignore:
  #     - master
  workflow_dispatch:

jobs:
  test:
    name: Run Rust Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Mock Database (for sqlx)
        run: |
          sqlite3 /tmp/db.sqlite "VACUUM;"
          cat migrations/*.sql | sqlite3 /tmp/db.sqlite

      - name: Run Tests
        env:
          DATABASE_URL: sqlite:///tmp/db.sqlite
          JWT_SECRET: s3cr3t-test-key
        run: cargo test
